previews:
  generation: automatic

services:
  - type: web
    name: gtd-agency-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: WP_API_URL
        sync: false
      - key: PUBLIC_SITE_URL
        sync: false
      - key: PUBLIC_SITE_NAME
        value: GTD Agency
      - key: PUBLIC_SITE_LOGO_TEXT
        value: GTD
      - key: PUBLIC_SITE_TAGLINE
        value: Galeria audiovisual
      - key: PUBLIC_SITE_LOCATION
        value: Republica Dominicana
      - key: PUBLIC_SITE_DESCRIPTION
        value: Galeria audiovisual de entrenamientos, marchas, desfiles y actividades militares en Republica Dominicana.
      - key: PUBLIC_OG_IMAGE
        value: /og-image.jpg
      - key: PUBLIC_HOME_HERO_SLUG
        value: home-hero
      - key: PUBLIC_HOME_PRESENTATION_SLUG
        value: home-presentation
      - key: PUBLIC_HOME_OVERVIEW_PAGE_SLUG
        value: home-overview
      - key: PUBLIC_HOME_FEATURED_PAGE_SLUG
        value: home-featured
      - key: PUBLIC_HOME_RECENT_PAGE_SLUG
        value: home-recent
      - key: PUBLIC_SHOW_DEMO_CONTENT
        value: "false"
